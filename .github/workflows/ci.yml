name: CI

on:
  push:
    branches: [main, release-*, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Bootstrap jbct-maven-plugin and slice-processor
        run: mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am

      - name: Build and test all modules
        run: mvn install -B
        timeout-minutes: 30

      - name: Run postgres-async integration tests
        run: mvn test -B -pl integrations/db/postgres-async -Dpostgres-async.skipTests=false
        timeout-minutes: 10

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          retention-days: 7

  forge-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Bootstrap jbct-maven-plugin and slice-processor
        run: mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am

      - name: Install all artifacts
        run: mvn install -B -DskipTests

      - name: Run Forge tests
        run: >
          mvn verify -B -Pwith-e2e -pl aether/forge/forge-tests
          -Dfailsafe.excludedGroups=Heavy
        timeout-minutes: 30

      - name: Upload Forge test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forge-test-results
          path: |
            aether/forge/forge-tests/target/failsafe-reports/*.xml
          retention-days: 7

  # E2E tests removed — replaced by Docker-based integration test suite
  # at aether/tests/integration/ (run manually on dedicated hardware).
  # See: aether/tests/integration/README.md
