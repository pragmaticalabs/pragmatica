name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Bootstrap jbct-maven-plugin and slice-processor
        run: mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am

      - name: Build all packages
        run: mvn package -B -DskipTests

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build distribution archives (linux-amd64)
        run: |
          chmod +x aether/dist/build-dist.sh
          aether/dist/build-dist.sh --version ${{ steps.version.outputs.VERSION }}

      - name: Generate JAR checksums
        run: |
          cd ${{ github.workspace }}
          sha256sum \
            jbct/jbct-cli/target/jbct.jar \
            aether/cli/target/aether.jar \
            aether/node/target/aether-node.jar \
            aether/forge/forge-core/target/aether-forge.jar \
            > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Pragmatica ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            jbct/jbct-cli/target/jbct.jar
            aether/cli/target/aether.jar
            aether/node/target/aether-node.jar
            aether/forge/forge-core/target/aether-forge.jar
            aether/dist/output/*.tar.gz
            aether/dist/output/*.zip
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build macOS archives on a macOS runner and attach to the release
  build-macos-dist:
    runs-on: macos-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Bootstrap jbct-maven-plugin and slice-processor
        run: mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am

      - name: Build all packages
        run: mvn package -B -DskipTests

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build distribution archives (macOS)
        run: |
          chmod +x aether/dist/build-dist.sh
          aether/dist/build-dist.sh --version ${{ steps.version.outputs.VERSION }}

      - name: Upload macOS archives to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aether/dist/output/*.tar.gz
            aether/dist/output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Linux arm64 archives via QEMU emulation
  build-linux-arm64-dist:
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build arm64 archives in container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            azul/zulu-openjdk:25 \
            bash -c '
              apt-get update -qq && apt-get install -y -qq zip binutils curl > /dev/null
              curl -sL https://archive.apache.org/dist/maven/maven-3/3.9.12/binaries/apache-maven-3.9.12-bin.tar.gz | tar xz -C /opt
              export PATH="/opt/apache-maven-3.9.12/bin:$PATH"
              mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am
              mvn package -B -DskipTests
              chmod +x aether/dist/build-dist.sh
              aether/dist/build-dist.sh --version ${{ steps.version.outputs.VERSION }}
            '

      - name: Upload arm64 archives to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aether/dist/output/*.tar.gz
            aether/dist/output/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Bootstrap and build
        run: |
          mvn install -B -DskipTests -pl jbct/jbct-maven-plugin,jbct/slice-processor -am
          mvn package -B -DskipTests

      - name: Build and push aether-node
        uses: docker/build-push-action@v6
        with:
          context: aether
          file: aether/docker/aether-node/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aether-node:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/aether-node:latest

      - name: Build and push aether-forge
        uses: docker/build-push-action@v6
        with:
          context: aether
          file: aether/docker/aether-forge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aether-forge:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/aether-forge:latest

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build-and-release
    if: false # Disabled: Docker networking in CI prevents reliable consensus departure detection

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'zulu'
          cache: 'maven'

      - name: Install all artifacts
        run: mvn install -B -DskipTests

      - name: Run E2E tests
        run: mvn verify -B -Pwith-e2e -pl aether/e2e-tests -DskipE2ETests=false
        timeout-minutes: 15

      - name: Run Forge tests
        run: mvn verify -B -Pwith-e2e -pl aether/forge/forge-tests
        timeout-minutes: 15

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            aether/e2e-tests/target/failsafe-reports/*.xml
            aether/forge/forge-tests/target/failsafe-reports/*.xml
          retention-days: 7
