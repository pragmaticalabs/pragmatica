# Aether runtime configuration

[messaging.click-events]
topic_name = "click-events"

[database]
type = "POSTGRESQL"
name = "url-shortener"
host = "localhost"
port = 5432
database = "forge"
username = "forge"
password = "forge"
# jdbc_url = "jdbc:postgresql://localhost:5432/forge"
# r2dbc_url = "r2dbc:postgresql://localhost:5432/forge"
async_url = "postgresql://localhost:5432/forge"

[database.pool_config]
min_connections = 10
max_connections = 50
idle_timeout = "10m"
connection_timeout = "5s"
max_lifetime = "30m"
leak_detection_timeout = "0s"
io_threads = 0
