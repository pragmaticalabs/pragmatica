# Aether integration test cluster configuration
# 5-node on-premises Docker cluster

[deployment]
type = "on-premises"

[deployment.runtime]
type = "container"
image = "ghcr.io/pragmaticalabs/aether-node:0.25.0"

[deployment.nodes]
core = "${TARGET_HOST}"

[deployment.ports]
cluster = 6000
management = 5150
app-http = 8070
swim = 6100

[deployment.tls]
auto_generate = true
cluster_secret = "${env:AETHER_CLUSTER_SECRET}"

[deployment.ssh]
user = "${env:AETHER_SSH_USER}"
key_path = "${env:AETHER_SSH_KEY}"

[cluster]
name = "integration-test"
version = "0.25.0"

[cluster.core]
count = 5
min = 3
max = 15

[cluster.auto_heal]
enabled = true
retry_interval = "10s"

[management]
port = 5150

[management.api-keys.admin-key]
name = "test-admin"
roles = ["admin"]

[management.api-keys.operator-key]
name = "test-operator"
roles = ["operator"]

[management.api-keys.viewer-key]
name = "test-viewer"
roles = ["viewer"]

[app-http]
enabled = true
port = 8070

[app-http.api-keys.admin-key]
name = "test-admin"
roles = ["admin"]

[app-http.api-keys.viewer-key]
name = "test-viewer"
roles = ["viewer"]
