# Aether integration test cluster configuration
# 5-node on-premises Docker cluster (single host via Docker Compose)

[deployment]
type = "on-premises"

[deployment.instances]
core = "default"

[deployment.runtime]
type = "container"
image = "ghcr.io/pragmaticalabs/aether-node:0.25.0"

[deployment.nodes]
core = "${TARGET_HOST},${TARGET_HOST},${TARGET_HOST},${TARGET_HOST},${TARGET_HOST}"

[deployment.ports]
cluster = 6000
management = 5150
app-http = 8070
swim = 6100

[deployment.tls]
auto_generate = true
cluster_secret = "integration-test-secret-do-not-use-in-production"

[deployment.ssh]
user = "${env:AETHER_SSH_USER}"
key_path = "${env:AETHER_SSH_KEY}"

[cluster]
name = "integration-test"
version = "0.25.0"

[cluster.core]
count = 5
min = 3
max = 15

[cluster.auto_heal]
enabled = true
retry_interval = "10s"
