# Aether Scaling Test — 5 Core Nodes
# Usage:
#   docker compose up --build                          # Start 5-node core cluster
#   docker compose -f docker-compose.yml -f docker-compose.workers.yml up --build  # + 7 workers

services:
  aether-node-1:
    build:
      context: ../..
      dockerfile: docker/aether-node/Dockerfile
      args:
        CONFIG_PATH: docker/scaling-test/aether.toml
    container_name: aether-node-1
    hostname: aether-node-1
    environment:
      NODE_ID: "node-1"
      CLUSTER_PORT: "8090"
      MANAGEMENT_PORT: "8080"
      CORE_MAX: "5"
      PEERS: "node-1:aether-node-1:8090,node-2:aether-node-2:8090,node-3:aether-node-3:8090,node-4:aether-node-4:8090,node-5:aether-node-5:8090"
      JAVA_OPTS: "-Xmx256m -XX:+UseZGC -XX:+ZGenerational"
    ports:
      - "8080:8080"
      - "8070:8070"
    networks:
      - scaling-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  aether-node-2:
    build:
      context: ../..
      dockerfile: docker/aether-node/Dockerfile
      args:
        CONFIG_PATH: docker/scaling-test/aether.toml
    container_name: aether-node-2
    hostname: aether-node-2
    environment:
      NODE_ID: "node-2"
      CLUSTER_PORT: "8090"
      MANAGEMENT_PORT: "8080"
      CORE_MAX: "5"
      PEERS: "node-1:aether-node-1:8090,node-2:aether-node-2:8090,node-3:aether-node-3:8090,node-4:aether-node-4:8090,node-5:aether-node-5:8090"
      JAVA_OPTS: "-Xmx256m -XX:+UseZGC -XX:+ZGenerational"
    ports:
      - "8081:8080"
      - "8071:8070"
    networks:
      - scaling-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    depends_on:
      aether-node-1:
        condition: service_healthy

  aether-node-3:
