      JAVA_OPTS: "-Xmx256m -XX:+UseZGC -XX:+ZGenerational"
    ports:
      - "8082:8080"
      - "8072:8070"
    networks:
      - scaling-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    depends_on:
      aether-node-2:
        condition: service_healthy

  aether-node-4:
