# Aether Scaling Test -- 7 Worker Nodes (overlay)
#
# Workers connect to core nodes via QUIC (UDP port 8090) for cluster transport.
# Within the Docker bridge network, all ports are accessible between containers.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.workers.yml up --build

services:
  aether-worker-6:
    build:
      context: ../..
      dockerfile: docker/aether-node/Dockerfile
      args:
        CONFIG_PATH: docker/scaling-test/aether.toml
    container_name: aether-worker-6
    hostname: aether-worker-6
    environment:
      NODE_ID: "node-6"
      CLUSTER_PORT: "8090"
      MANAGEMENT_PORT: "8080"
      CORE_MAX: "5"
      PEERS: "node-1:aether-node-1:8090,node-2:aether-node-2:8090,node-3:aether-node-3:8090,node-4:aether-node-4:8090,node-5:aether-node-5:8090"
      JAVA_OPTS: "-Xmx256m -XX:+UseZGC -XX:+ZGenerational -XX:+UseCompactObjectHeaders"
    ports:
      - "8185:8080"
      - "8075:8070"
    networks:
      - scaling-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

