# Aether Node Configuration for Containerized Deployment
#
# TLS note: `tls = false` means the management API uses plain HTTP (needed for
# curl-based health checks and integration tests). QUIC cluster transport still
# uses TLS with ephemeral self-signed certs. Set `tls = true` for production
# (enables mTLS management API + deterministic CA from cluster secret).

[cluster]
tls = false

[slice]
# "builtin" resolves artifacts from the distributed DHT (quorum reads, replicated across nodes).
# "local" falls back to ~/.m2/repository — useful for dev, not needed in production.
repositories = ["builtin"]

[app-http]
enabled = true
api_keys = ["aether-integration-test-key"]

[messaging.click-events]
topic_name = "click-events"

[cloud]
provider = "docker"

[cloud.compute]
image_name = "aether-node:local"
network_name = "aether-network"
management_port_base = "5150"
app_port_base = "8070"
cluster_port = "6000"
socket_path = "/var/run/docker.sock"

[database]
username = "forge"
password = "forge"
async_url = "postgresql://forge-postgres:5432/forge"

[database.pool_config]
min_connections = 20
max_connections = 100
idle_timeout = "10m"
connection_timeout = "5s"
max_lifetime = "30m"
leak_detection_timeout = "0s"
io_threads = 0
